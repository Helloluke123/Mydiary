<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的動漫風日記</title>
    <link rel="stylesheet" href="css/style.css?v=2.5">
    <link rel="manifest" href="manifest.json?v=2.5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FFB7C5">
</head>
<body>
    <div id="auth-container" style="padding: 50px 20px; text-align: center;">
        <div class="diary-card" style="display: inline-block; max-width: 400px; width: 100%; background: white; padding: 30px; border-radius: 20px;">
            <h2 style="color: #FFB7C5;">🌸 歡迎回來 🌸</h2>
            <button id="google-login-btn" style="background-color: white; border: 1px solid #ddd; padding: 12px 20px; cursor: pointer; border-radius: 25px; width: 100%; margin: 20px 0;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width: 20px; margin-right: 12px;"> 使用 Google 帳號切換
            </button>
            <div style="margin: 20px 0; color: #ccc;">或</div>
            <input type="email" id="email" placeholder="電子郵件" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 20px; border: 1px solid #FFB7C5;">
            <input type="password" id="password" placeholder="密碼" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 20px; border: 1px solid #FFB7C5;">
            <br>
            <button id="login-btn" style="background: #FFB7C5; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer;">登入</button>
            <button id="signup-btn" style="background: #f9f9f9; border: 1px solid #eee; padding: 10px 20px; border-radius: 20px; cursor: pointer;">註冊</button>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="container">
            
            <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px 10px; margin-bottom: 10px;">
                <h1 style="margin: 0; font-size: 2.2rem;">🌸 心情日誌 🌸</h1>
                
                <div style="position: relative; display: flex; gap: 10px; align-items: center;">
                    <button id="toggle-filter-btn" style="background: white; border: 2px solid #2c2c2c; color: #2c2c2c; padding: 6px 14px; border-radius: 15px; cursor: pointer; font-size: 13px; font-weight: bold; box-shadow: 2px 2px 0px #ffb7c5; transition: all 0.2s ease; outline: none;">
                        🔍 搜尋回憶
                    </button>
                    <button id="logout-btn" style="border: 2px solid #2c2c2c; color: #2c2c2c; background: white; padding: 6px 14px; border-radius: 15px; cursor: pointer; font-size: 13px; font-weight: bold; box-shadow: 2px 2px 0px #ddd;">登出</button>

                    <section id="filter-panel" class="diary-card hide-panel" style="position: absolute; top: 45px; right: 0; width: 280px; padding: 15px; border: 3px solid #2c2c2c; background: #fffafb; box-shadow: 6px 6px 0px #ffb7c5; z-index: 999; margin: 0; box-sizing: border-box;">
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <input type="text" id="search-input" placeholder="🔍 輸入關鍵字搜尋..." style="width: 100%; box-sizing: border-box; padding: 8px 12px; border-radius: 12px; border: 2px solid #2c2c2c; outline: none; font-size: 13px;">
                        </div>
                        <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
                            <span style="font-size: 12px; color: #555; font-weight: bold;">篩選：</span>
                            <div class="filter-mood-selector" style="display: flex; gap: 4px;">
                                <span class="filter-mood-btn active" data-filter="all" style="padding: 2px 8px; background: #FFB7C5; color: white; border: 1px solid #2c2c2c; border-radius: 8px; cursor: pointer; font-size: 12px;">全</span>
                                <span class="filter-mood-btn" data-filter="😊" style="padding: 2px 6px; background: #fdf0f2; border: 1px solid transparent; border-radius: 8px; cursor: pointer; font-size: 12px;">😊</span>
                                <span class="filter-mood-btn" data-filter="🌟" style="padding: 2px 6px; background: #fdf0f2; border: 1px solid transparent; border-radius: 8px; cursor: pointer; font-size: 12px;">🌟</span>
                                <span class="filter-mood-btn" data-filter="☁️" style="padding: 2px 6px; background: #fdf0f2; border: 1px solid transparent; border-radius: 8px; cursor: pointer; font-size: 12px;">☁️</span>
                                <span class="filter-mood-btn" data-filter="🌧️" style="padding: 2px 6px; background: #fdf0f2; border: 1px solid transparent; border-radius: 8px; cursor: pointer; font-size: 12px;">🌧️</span>
                            </div>
                        </div>
                    </section>
                </div>
            </header>
            
            <main>
                <section class="input-section diary-card">
                    <textarea id="diary-input" placeholder="今天發生了什麼有趣的事呢..."></textarea>
                    <textarea id="prayer-input" placeholder="💡 寫下你今天想禱告的內容... (選填)" style="margin-top: 10px; border: 2px dashed #ffb7c5; background: #fff9fa; min-height: 80px; width: 100%; box-sizing: border-box; padding: 10px; border-radius: 14px; outline: none; font-family: inherit; resize: vertical; font-size: 14px;"></textarea>
                    
                    <div class="controls">
                        <div class="mood-selector">
                            <span class="mood-btn active" data-mood="😊">😊</span>
                            <span class="mood-btn" data-mood="🌟">🌟</span>
                            <span class="mood-btn" data-mood="☁️">☁️</span>
                            <span class="mood-btn" data-mood="🌧️">🌧️</span>
                        </div>
                        <button id="save-btn" class="save-btn">保存紀錄 ✨</button>
                    </div>
                </section>

                <section id="diary-list"></section>
            </main>
        </div>
    </div>

    <script type="module" src="js/main.js?v=2.5"></script>
</body>
</html>
