<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的動漫風日記</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <!-- 1. 登入區塊 -->
    <div id="auth-container" style="padding: 50px 20px; text-align: center;">
        <div class="diary-card" style="display: inline-block; max-width: 400px; width: 100%; background: white; padding: 30px; border-radius: 20px;">
            <h2 style="color: #FFB7C5; margin-bottom: 20px;">🌸 歡迎回來 🌸</h2>
            <button id="google-login-btn" style="background-color: white; border: 1px solid #ddd; padding: 12px 20px; cursor: pointer; border-radius: 25px; width: 100%; display: flex; align-items: center; justify-content: center;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width: 20px; margin-right: 12px;"> 使用 Google 登入
            </button>
            <hr style="margin: 20px 0; border: 0.5px solid #eee;">
            <input type="email" id="email" placeholder="電子郵件" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 20px; border: 1px solid #FFB7C5;">
            <input type="password" id="password" placeholder="密碼" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 20px; border: 1px solid #FFB7C5;">
            <br>
            <button id="login-btn" style="background: #FFB7C5; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer;">登入</button>
            <button id="signup-btn" style="background: #f9f9f9; border: 1px solid #eee; padding: 10px 20px; border-radius: 20px; cursor: pointer;">註冊</button>
        </div>
    </div>

    <!-- 2. 日記主內容 -->
    <div id="main-content" style="display: none;">
        <div class="container">
            <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
                <h1>🌸 心情日誌 🌸</h1>
                <button id="logout-btn" style="border: 1px solid #FFB7C5; color: #FFB7C5; background: white; padding: 5px 15px; border-radius: 15px; cursor: pointer;">登出</button>
            </header>
            <main>
                <section class="input-section diary-card">
                    <textarea id="diary-input" placeholder="今天發生了什麼有趣的事呢..."></textarea>
                    <div class="controls">
                        <div class="mood-selector">
                            <span class="mood-btn active">😊</span>
                            <span class="mood-btn">🌟</span>
                            <span class="mood-btn">☁️</span>
                            <span class="mood-btn">🌧️</span>
                        </div>
                        <button id="save-btn" class="save-btn">保存紀錄 ✨</button>
                    </div>
                </section>
                <section id="diary-list" class="diary-list"></section>
            </main>
        </div>
    </div>

    <!-- 唯一引用的 JS -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
