<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的動漫風日記</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- PWA 支援 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <!-- 1. 登入區塊 (未登入時顯示) -->
    <div id="auth-container" style="padding: 50px 20px; text-align: center;">
        <div class="diary-card" style="display: inline-block; max-width: 400px; width: 100%; background: white; padding: 30px; border-radius: 20px;">
            <h2 style="color: #FFB7C5; margin-bottom: 20px;">🌸 歡迎回來 🌸</h2>
            <button id="google-login-btn" style="background-color: white; color: #757575; border: 1px solid #ddd; padding: 12px 20px; cursor: pointer; border-radius: 25px; display: flex; align-items: center; justify-content: center; width: 100%; margin: 20px 0; font-size: 16px;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width: 20px; margin-right: 12px;">
                使用 Google 帳號登入
            </button>
            <div style="margin: 20px 0; color: #ccc; display: flex; align-items: center;">
                <hr style="flex: 1; border: 0.5px solid #eee;"> <span style="margin: 0 10px; font-size: 12px;">或使用信箱</span> <hr style="flex: 1; border: 0.5px solid #eee;">
            </div>
            <input type="email" id="email" placeholder="電子郵件" style="padding: 12px; margin: 10px 0; width: 90%; border-radius: 20px; border: 1px solid #FFB7C5; outline: none;">
            <input type="password" id="password" placeholder="密碼" style="padding: 12px; margin: 10px 0; width: 90%; border-radius: 20px; border: 1px solid #FFB7C5; outline: none;">
            <br>
            <button id="login-btn" style="background-color: #FFB7C5; border: none; padding: 10px 30px; color: white; cursor: pointer; border-radius: 20px; margin: 10px; font-weight: bold;">登入</button>
            <button id="signup-btn" style="background-color: #f9f9f9; border: 1px solid #eee; padding: 10px 30px; cursor: pointer; border-radius: 20px; margin: 10px; color: #777;">註冊</button>
        </div>
    </div>

    <!-- 2. 日記主內容 (登入後顯示) -->
    <div id="main-content" style="display: none;">
        <div class="container">
            <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
                <div style="flex: 1;"></div>
                <h1 style="flex: 2; text-align: center;">🌸 心情日誌 🌸</h1>
                <div style="flex: 1; text-align: right;">
                    <button id="logout-btn" style="background: white; border: 1px solid #FFB7C5; color: #FFB7C5; cursor: pointer; border-radius: 15px; padding: 5px 15px;">登出</button>
                </div>
            </header>

            <main>
                <section class="input-section diary-card">
                    <textarea id="diary-input" placeholder="今天發生了什麼有趣的事呢..."></textarea>
                    <div class="controls">
                        <div class="mood-selector">
                            <span class="mood-btn active" data-mood="😊">😊</span>
                            <span class="mood-btn" data-mood="🌟">🌟</span>
                            <span class="mood-btn" data-mood="☁️">☁️</span>
                            <span class="mood-btn" data-mood="🌧️">🌧️</span>
                        </div>
                        <button id="save-btn" class="save-btn">保存紀錄 ✨</button>
                    </div>
                </section>
                <section id="diary-list" class="diary-list"></section>
            </main>
        </div>
    </div>

    <!-- 唯一引用的 JS 入口 -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
